<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#FAFAF8">
<title>Habits</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
  html,body{height:100%;background:#FAFAF8;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#1A1916}
  body{padding:env(safe-area-inset-top,20px) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);overflow-x:hidden}

  .screen{max-width:430px;margin:0 auto;padding:28px 20px 100px}

  .header{margin-bottom:28px}
  .day-name{font-size:32px;font-weight:600;letter-spacing:-0.5px;color:#1A1916;line-height:1}
  .sub-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .date-str{font-size:14px;color:#9A9890}
  .nav-pills{display:flex;gap:6px}
  .npill{background:none;border:1px solid #E0DDD6;border-radius:20px;padding:5px 13px;font-size:12px;color:#9A9890;cursor:pointer;font-family:inherit}
  .npill.now{background:#1A1916;color:#FAFAF8;border-color:#1A1916}

  .habits{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}

  .card{display:flex;align-items:center;border-radius:16px;padding:16px 18px;cursor:pointer;transition:transform 0.08s,opacity 0.08s;gap:14px;min-height:58px}
  .card:active{transform:scale(0.97);opacity:0.9}
  .card-name{flex:1;font-size:15px;font-weight:500;color:#2C2C2A;line-height:1.3}
  .circle{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,border-color 0.15s}
  .circle.done{background:#34C759;border-color:#34C759}
  .circle.skip{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1)}
  .circle svg{width:17px;height:17px}

  .prog-wrap{margin-bottom:28px}
  .prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .prog-label{font-size:13px;color:#9A9890}
  .prog-frac{font-size:13px;font-weight:500;color:#1A1916}
  .prog-track{height:4px;background:#E8E6E0;border-radius:4px;overflow:hidden}
  .prog-fill{height:4px;background:#34C759;border-radius:4px;transition:width 0.35s}

  .add-area{margin-top:4px}
  .add-ghost{width:100%;background:none;border:1.5px dashed #D0CEC7;border-radius:16px;padding:15px 18px;font-size:14px;color:#B4B2A9;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px}
  .add-ghost:active{background:rgba(0,0,0,0.03)}
  .add-ghost-icon{width:28px;height:28px;border-radius:50%;background:#EFEFEB;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  .add-form{background:#F1EFE8;border-radius:16px;padding:14px 16px;margin-top:8px;display:none}
  .add-input{width:100%;background:white;border:1px solid #E0DDD6;border-radius:10px;padding:11px 14px;font-size:15px;color:#1A1916;font-family:inherit;outline:none}
  .add-input:focus{border-color:#9A9890}
  .add-btns{display:flex;gap:8px;margin-top:10px}
  .btn-submit{flex:1;background:#1A1916;color:#FAFAF8;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  .btn-cancel{background:none;border:1px solid #D0CEC7;border-radius:10px;padding:11px 16px;font-size:14px;color:#9A9890;cursor:pointer;font-family:inherit}

  .long-hint{text-align:center;font-size:11px;color:#D0CEC7;margin-top:16px}
</style>
</head>
<body>
<div class="screen">

  <div class="header">
    <div class="day-name" id="dayName"></div>
    <div class="sub-row">
      <div class="date-str" id="dateStr"></div>
      <div class="nav-pills">
        <button class="npill" onclick="shift(-1)">←</button>
        <button class="npill now" id="todayPill" onclick="goToday()">Today</button>
        <button class="npill" onclick="shift(1)">→</button>
      </div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-meta">
      <span class="prog-label">Today's progress</span>
      <span class="prog-frac" id="progFrac">0 / 0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="habits" id="habitList"></div>

  <div class="add-area">
    <button class="add-ghost" id="addToggle" onclick="toggleForm()">
      <div class="add-ghost-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="#9A9890" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="#9A9890" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      Add habit
    </button>
    <div class="add-form" id="addForm">
      <input class="add-input" id="newName" type="text" placeholder="e.g. Read 20 pages" autocomplete="off" />
      <div class="add-btns">
        <button class="btn-submit" onclick="submitHabit()">Add</button>
        <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="long-hint">Hold a habit to remove it</div>

</div>

<script>
const PASTELS = ['#D4F5DC','#D0EEFF','#FFFACD','#F0D8FF','#FFE8D6','#FFD6DA','#FFEFD5','#D6F0FF','#E8FFD6','#FFD6F0'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let habits = [], comps = {}, offset = 0;

const DEFAULT = [
  {id:'h1',name:'Morning cardio',color:'#D4F5DC'},
  {id:'h2',name:'Weightlifting',color:'#D0EEFF'},
  {id:'h3',name:'GMAT study',color:'#FFFACD'},
  {id:'h4',name:'Projects & Claude Code',color:'#F0D8FF'},
  {id:'h5',name:'Vitamins',color:'#FFE8D6'},
  {id:'h6',name:'Guitar practice',color:'#FFD6DA'},
  {id:'h7',name:'Painting',color:'#FFEFD5'},
  {id:'h8',name:'Hit 2500+ cal',color:'#D6F0FF'},
];

function dayKey(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return d.toISOString().split('T')[0];
}
function compKey(off) { return 'hb-c-' + dayKey(off); }

function loadHabits() {
  try { habits = JSON.parse(localStorage.getItem('hb-habits')) || DEFAULT; }
  catch(e) { habits = DEFAULT; }
}
function saveHabits() { localStorage.setItem('hb-habits', JSON.stringify(habits)); }

function loadComps(off) {
  try { comps = JSON.parse(localStorage.getItem(compKey(off))) || {}; }
  catch(e) { comps = {}; }
}
function saveComps() { localStorage.setItem(compKey(offset), JSON.stringify(comps)); }

function updateHeader(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  document.getElementById('dayName').textContent = DAYS[d.getDay()];
  document.getElementById('dateStr').textContent = `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('todayPill').className = 'npill' + (off === 0 ? ' now' : '');
}

function render() {
  const list = document.getElementById('habitList');
  let done = 0;
  list.innerHTML = habits.map(h => {
    const state = comps[h.id] || 'none';
    if (state === 'done') done++;
    const circleClass = state === 'done' ? 'circle done' : state === 'skip' ? 'circle skip' : 'circle';
    const icon = state === 'done'
      ? `<svg viewBox="0 0 17 17" fill="none"><polyline points="3,8.5 7,12.5 14,4.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg viewBox="0 0 17 17" fill="none"><line x1="5" y1="5" x2="12" y2="12" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="5" x2="5" y2="12" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    return `<div class="card" style="background:${h.color}" data-id="${h.id}" onclick="toggle('${h.id}')">
      <span class="card-name">${h.name}</span>
      <div class="${circleClass}">${icon}</div>
    </div>`;
  }).join('');

  // long press to delete
  document.querySelectorAll('.card').forEach(card => {
    let timer;
    card.addEventListener('touchstart', () => {
      timer = setTimeout(() => confirmDelete(card.dataset.id), 600);
    });
    card.addEventListener('touchend', () => clearTimeout(timer));
    card.addEventListener('touchmove', () => clearTimeout(timer));
  });

  const pct = habits.length ? Math.round(done / habits.length * 100) : 0;
  document.getElementById('progFrac').textContent = `${done} / ${habits.length}`;
  document.getElementById('progFill').style.width = pct + '%';
}

function toggle(id) {
  comps[id] = (comps[id] === 'done') ? 'none' : 'done';
  saveComps();
  render();
}

function confirmDelete(id) {
  const h = habits.find(x => x.id === id);
  if (h && confirm(`Remove "${h.name}"?`)) {
    habits = habits.filter(x => x.id !== id);
    saveHabits(); render();
  }
}

function shift(d) {
  offset += d;
  updateHeader(offset);
  loadComps(offset);
  render();
}

function goToday() {
  offset = 0;
  updateHeader(0);
  loadComps(0);
  render();
}

function toggleForm() {
  const f = document.getElementById('addForm');
  const show = f.style.display !== 'block';
  f.style.display = show ? 'block' : 'none';
  if (show) { document.getElementById('newName').focus(); }
}

function submitHabit() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  habits.push({ id: 'h' + Date.now(), name, color: PASTELS[habits.length % PASTELS.length] });
  saveHabits();
  document.getElementById('newName').value = '';
  document.getElementById('addForm').style.display = 'none';
  render();
}

document.getElementById('newName').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitHabit();
  if (e.key === 'Escape') toggleForm();
});

loadHabits();
loadComps(0);
updateHeader(0);
render();
</script>
</body>
</html>
